name: UI Tests (Playwright - Headless)

on:
  push:
    branches: [ playwright-migration, main ]
  pull_request:
    branches: [ playwright-migration, main ]
  workflow_dispatch:

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies (important!)
        run: ./mvnw dependency:resolve test-compile -q

      - name: Install Playwright Chromium + system dependencies
        run: |
          ./mvnw exec:java -e \
            -Dexec.mainClass="com.microsoft.playwright.CLI" \
            -Dexec.args="install --with-deps chromium"

      - name: Run YouTube Playwright test (headless)
        run: ./mvnw -B clean test -Dtest=YouTubeSmokeTest -Dheadless=true

      - name: Upload screenshots and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-artifacts
          path: target/artifacts/
          retention-days: 14