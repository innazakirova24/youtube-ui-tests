name: UI Tests (Playwright - Headless)

on:
  push:
    branches: [ playwright-migration, main ]
  pull_request:
    branches: [ playwright-migration, main ]
  workflow_dispatch:

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Resolve dependencies
        run: ./mvnw dependency:go-offline test-compile -q

      - name: Install Playwright browsers
        run: ./mvnw com.microsoft.playwright:playwright-maven-plugin:1.49.0:install -Dplaywright.platform=linux

      - name: Run YouTube Playwright test (headless)
        run: ./mvnw -B clean test -Dtest=YouTubeSmokeTest -Dheadless=true

      - name: Upload artifacts (screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: target/artifacts/
          retention-days: 14