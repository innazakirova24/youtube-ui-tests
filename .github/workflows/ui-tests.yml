name: UI Tests

on:
  workflow_dispatch:

jobs:
  youtube-headless:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run headless UI test
        run: ./mvnw -B -Dtest=YouTubeSmokeTest test -Dheadless=true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-last-page
          path: target/artifacts/